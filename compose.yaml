services:
  db:
    image: postgres:16
    container_name: ysdevidx-postgres
    environment:
      POSTGRES_DB: ysdevidx
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
